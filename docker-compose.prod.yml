# docker-compose.prod.yml — uso: docker compose -f docker-compose.prod.yml up -d
# Sem banco interno, usa Postgres externo (172.20.0.3:5432 via Authentik)
# Frontend e backend conectados ao proxy_net para reverse proxy via Caddy

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3001
    networks:
      - proxy_net
      - data_net
    labels:
      - "traefik.enable=false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
  data_net:
    external: true
