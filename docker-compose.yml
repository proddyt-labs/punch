services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: timetracker
      POSTGRES_PASSWORD: ${DB_PASSWORD:-timetracker_pass}
      POSTGRES_DB: timetracker
    volumes:
      - timetracker-db:/var/lib/postgresql/data
    networks:
      - timetracker-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://timetracker:${DB_PASSWORD:-timetracker_pass}@db:5432/timetracker
      PORT: 3001
      GATE_URL: http://gate-backend:3100
      GATE_CLIENT_ID: punch
      GATE_CLIENT_SECRET: ${GATE_CLIENT_SECRET:-1cd38a3a-8492-4731-bef6-e405dd6d8671}
    networks:
      - timetracker-net
      - proxy_net
    labels:
      - "traefik.enable=false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GATE_URL: https://sso.proddyt.site
        VITE_CLIENT_ID: punch
        VITE_REDIRECT_URI: https://punch.proddyt.site/auth/callback
    container_name: punch-frontend
    restart: unless-stopped
    networks:
      - timetracker-net
      - proxy_net

volumes:
  timetracker-db:

networks:
  timetracker-net:
    driver: bridge
  proxy_net:
    external: true
